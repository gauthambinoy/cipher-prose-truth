version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./clarityai.db
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - ./backend:/app
      - db-data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db-data:
