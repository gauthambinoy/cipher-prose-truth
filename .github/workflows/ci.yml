name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install runtime dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm
          python -c "import nltk; nltk.download('punkt'); nltk.download('punkt_tab'); nltk.download('averaged_perceptron_tagger'); nltk.download('stopwords')"

      - name: Install dev dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff
        working-directory: backend
        run: ruff check app/ --select E,F,W --ignore E501

      - name: Check formatting with black
        working-directory: backend
        run: black --check app/ tests/

      - name: Run pytest with coverage
        working-directory: backend
        run: pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=50

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run vitest
        working-directory: frontend
        run: npm run test

      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t clarityai-backend ./backend

      - name: Verify image runs
        run: |
          docker run -d --name clarityai-test -p 8000:8000 clarityai-backend
          sleep 10
          curl -f http://localhost:8000/api/v1/health || exit 1
          docker stop clarityai-test
