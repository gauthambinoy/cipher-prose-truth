services:
  - type: web
    name: clarityai-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./clarityai.db
      - key: CORS_ORIGINS
        value: https://clarityai-pied.vercel.app,http://localhost:5173
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /api/v1/health
    autoDeploy: true
